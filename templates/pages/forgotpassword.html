<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Восстановление пароля</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='components/header.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='components/footer.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='pages/forgotpassword.css') }}" />
  </head>
  <body>
    {% include 'components/header.html' %}

    <main class="forgot-page">
      <section class="forgot-panel page-width">
        <div class="forgot-card">
          <div class="forgot-card__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5a5 5 0 0 1 5 5v3h1.5a1.5 1.5 0 0 1 0 3H6.5a1.5 1.5 0 0 1 0-3H8V10a5 5 0 0 1 4-4.9V4a1 1 0 0 1 2 0v1.1A5 5 0 0 1 12 5Zm-2 9h4v-3a2 2 0 1 0-4 0v3Zm-1.5 2.5a.5.5 0 0 0 0 1h7a.5.5 0 0 0 0-1h-7Z"/></svg>
          </div>

          <div class="forgot-card__intro">
            <h1>Забыли пароль?</h1>
            <p>Введите ваш email, и мы вышлем инструкции по восстановлению пароля.</p>
          </div>

          <form class="forgot-form">
            <label class="sr-only" for="forgot-email">Email</label>
            <input id="forgot-email" type="email" placeholder="example@email.com" required />
            <button type="submit">Отправить инструкции</button>
          </form>

          <p class="forgot-back">
            <a href="/login">Вернуться к входу</a>
          </p>
        </div>
      </section>
    </main>

    {% include 'components/footer.html' %}
  </body>
</html>
